id: meso.olmec_colossal_head_style
type: style
name: Olmec Colossal Head / Monumental Stone Style
aliases:
  - Olmec monumental sculpture
  - Gulf Coast formative style
culture_scope: [olmec]
summary: >
  The massive, austere carved-stone tradition of the Olmec civilisation
  (1500–400 BCE), epitomised by colossal basalt heads and jade figurines —
  simplified volumes, smooth surfaces, downturned mouths.
description: |
  The Olmec are recognised as a foundational influence on later Mesoamerican
  cultures. Their monumental stone style is characterised by:

  - **Simplified volumetric forms**: rounded masses with minimal surface
    decoration; the helmet-like quality of colossal heads.
  - **Iconic "were-jaguar" features**: snarling or downturned mouth,
    cleft brow, almond eyes — a supernatural infant-jaguar hybrid motif.
  - **Scale contrast**: monumental basalt heads (up to 3.4 m) versus tiny
    jade figurines using the same formal vocabulary.
  - **Smooth surface dominance**: extensive uncarved negative space;
    detail concentrated on facial features.
  - **Colour contrast**: dark basalt / serpentine against bright jade green.

  Key sites: San Lorenzo, La Venta, Tres Zapotes.
tags:
  culture_scope: [olmec]
  medium: [stone_relief, jade]
  motif_type: [deity, animal]
  geometry: [symmetry]
  surface: [carved, weathered]
  palette: [jade_turquoise, obsidian_black, earthtones]
  composition: [central_mask, emblem]
  mood: [ceremonial, austere]
  remix: [none]
  shader_ops: [relief_shading, noise, normal_map]
constraints:
  do:
    - Emphasise smooth rounded volumes with detail only in the facial zone.
    - Use a near-monochrome palette (dark basalt greens or blacks).
    - Exaggerate the downturned-lip / broad-nose facial signature.
    - Apply subtle surface weathering (lichen, erosion noise).
  avoid:
    - Avoid adding elaborate costume details — Olmec monumental work is
      deliberately stripped of decorative excess.
parameters:
  surface_smoothness: 0.85    # 0–1, higher = smoother
  feature_concentration: "face_only"
compat:
  - meso.jade_greenstone_material
  - meso.shader_stone_weathering
  - meso.were_jaguar_motif
provenance:
  period: "Olmec Formative, 1500–400 BCE"
  sources:
    - "Pool, C. A. (2007). Olmec Archaeology and Early Mesoamerica. Cambridge UP."
    - "Grove, D. C. (1981). Olmec Monuments: Mutilation as a Clue to Meaning."
version: "1.0"
created_at: "2026-04-10"
