constraints:
  do:
    - Use the 20 day signs as a decorative vocabulary — emblem stamps,
      ring compartments, or grid-fill.
    - Label clearly as "inspired by Aztec/Maya day-sign tradition."
    - Reference published scholarly sources for accurate glyph forms.
  avoid:
    - Do not assign predictive or astrological readings to day signs in
      a commercial or public-facing context without cultural consultation.
    - Do not mix Aztec and Maya day-sign forms without clearly labelling
      which tradition each comes from.
