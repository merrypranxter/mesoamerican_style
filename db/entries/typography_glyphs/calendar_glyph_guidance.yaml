summary: >
  Guidance for using the 20 Mesoamerican day-sign forms as decorative
  elements — with respectful use rules and visual structure notes for each
  of the major tradition's day-count glyph sets.
description: |
  ## The 20-day cycle

  Both Maya (Tzolk'in) and Aztec (Tonalpohualli) calendars use a cycle of
  20 named days that repeat continuously. The day signs are among the most
  reproduced elements in popular culture — often stripped of context.

  ## Aztec 20 day signs (Tonalpohualli) — visual descriptors

  | # | Name | Image core | Shape note |
  |---|------|-----------|------------|
  | 1 | Cipactli (Crocodile) | Spiny back, saw teeth | Spiky bilateral |
  | 2 | Ehecatl (Wind) | Wind jewel buccal mask | Circular bird-beak |
  | 3 | Calli (House) | Gabled roof profile | Triangular roof |
  | 4 | Cuetzpalin (Lizard) | Profile lizard | Curved body |
  | 5 | Coatl (Serpent) | Profile serpent | S-curve or coil |
  | 6 | Miquiztli (Death) | Skull face | Skull + lower jaw |
  | 7 | Mazatl (Deer) | Profile deer head | Antler branching |
  | 8 | Tochtli (Rabbit) | Profile rabbit head | Long ear, nose |
  | 9 | Atl (Water) | Water stream + chalchihuitl | Curved streams |
  | 10 | Itzcuintli (Dog) | Profile dog | Collar, snout |
  | 11 | Ozomatli (Monkey) | Profile monkey | Curling tail |
  | 12 | Malinalli (Grass) | Twisted grass bundle | Helix twist |
  | 13 | Acatl (Reed) | Vertical reeds | Parallel vertical |
  | 14 | Ocelotl (Jaguar) | Profile jaguar | Rosette spots |
  | 15 | Cuauhtli (Eagle) | Profile eagle head | Hooked beak |
  | 16 | Cozcacuauhtli (Vulture) | Profile vulture | Wrinkled neck |
  | 17 | Ollin (Motion/Earthquake) | 4-part Ollin sign | Diagonal cross |
  | 18 | Tecpatl (Flint knife) | Sacrificial blade | Angular blade |
  | 19 | Quiahuitl (Rain) | Tlaloc head with rain | Goggle eyes |
  | 20 | Xochitl (Flower) | Stylised flower | 4-petal radial |

  ## Usage guidance

  Day signs may be used as:
  - Decorative compartment fills in a 20-unit ring (calendar round layout)
  - Isolated emblem stamps for specific named entities
  - Background texture in repeated 4×5 grid

  **Do not use day signs to assign "real" dates or astrological meanings
  in a commercial context without cultural consultation.**

  ## Maya Tzolk'in day signs
  The Maya equivalents share the same 20-day structure but use distinct
  glyph forms — refer to a qualified Maya epigrapher or the Coe/Van Stone
  reference for accurate visual forms before reproduction.
