id: meso.register_stack_layout
type: pattern
name: Stacked Register Layout
aliases:
  - Horizontal register composition
  - Frieze stack
culture_scope: [maya, aztec_mexica, mixtec, zapotec, general_mesoamerican]
summary: >
  The primary spatial organisation principle of Mesoamerican pictorial
  art — narrative or symbolic content arranged in stacked horizontal bands
  (registers), each framed by border lines.
description: |
  Register-based layout is the foundational page/surface organisation
  principle across codex, ceramic, and mural traditions:

  - **Definition**: a register is a horizontal zone bounded top and bottom
    by a continuous line; content within the register reads left to right
    (or sometimes right to left) and may wrap.
  - **Stacking logic**: registers stack vertically; upper registers often
    represent sky/celestial; lower registers = earth/underworld; middle =
    human/present action.
  - **Baseline convention**: figures stand on the lower border line of their
    register; they do not overlap into other registers unless a deliberate
    compositional statement.
  - **Colour banding**: in some traditions (Aztec, Mixtec), each register
    has a distinct background colour to differentiate zones.
  - **Page structure**: Aztec/Mixtec codex pages use the register stack as
    their fundamental grid; border bands frame the outer edge.
  - **Ceramic wraparound**: on vessels, the scene band is a single register
    that wraps 360°; the PSS/text band is a separate narrow register.

  Useful as: page template, UI layout metaphor, animation sequence template.
tags:
  culture_scope: [maya, aztec_mexica, mixtec, general_mesoamerican]
  medium: [codex_painting, ceramics, stucco_mural, stone_relief]
  motif_type: [pattern]
  geometry: [banded, grid]
  surface: [painted, carved]
  palette: [limited]
  composition: [register, frieze, border_band]
  mood: [ceremonial, mythic]
  remix: [none]
  shader_ops: [palette_map, edge_ink]
constraints:
  do:
    - Use a consistent border-line weight for register dividers.
    - Apply cosmological zone logic: sky top, earth bottom.
    - Keep figure baselines on the register-floor line.
    - Use distinct background colour per register where tradition supports it.
  avoid:
    - Avoid mixing register logic with perspective depth — these are
      conceptual spaces, not physical ones.
parameters:
  register_count: 3       # number of stacked zones
  zone_logic: "sky_earth" # sky_earth | chronological | thematic
  border_line_weight: 2   # px at reference scale
compat:
  - meso.aztec_codex_painting_style
  - meso.mixtec_codex_style
  - meso.maya_polychrome_ceramic_style
provenance:
  period: "Pre-Columbian general, 200–1521 CE"
  sources:
    - "Boone, E. H. (2000). Stories in Red and Black. U of Texas Press."
    - "Marcus, J. (1992). Mesoamerican Writing Systems. Princeton UP."
version: "1.0"
created_at: "2026-04-10"
