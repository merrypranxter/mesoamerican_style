id: meso.tlaloc_rain_deity
type: symbol
name: Tlaloc / Rain Deity
aliases:
  - Tláloc (Nahuatl)
  - Chaac (Yucatec Maya)
  - Cocijo (Zapotec)
  - Dzahui (Mixtec)
culture_scope: [aztec_mexica, maya, zapotec, mixtec, teotihuacan, general_mesoamerican]
summary: >
  The rain, water, and fertility deity found across Mesoamerica under different
  names — visually distinguished by goggle eyes, fang mouth, and lightning/
  serpent associations.
description: |
  Among the most ancient and pan-Mesoamerican of deities, Tlaloc/Chaac
  is recognisable by:

  - **Goggle eyes**: large circular or ring-shaped eyes (originally water-
    goggles or serpent-eye rings); the most diagnostic visual element.
  - **Fang mouth**: two large curved fangs (serpent fangs) curling outward
    from upper jaw; sometimes lightning-bolt serpent tongue.
  - **Lightning axe**: Chaac/Tlaloc wields a serpent or axe to strike clouds
    and produce rain; axe = lightning.
  - **Trilobate spiral**: breath / wind scrolls often surround the figure.
  - **Colour**: blue-green (water) in painted versions; jade-coloured eyes/
    accessories are common.
  - **Tasseled headdress**: compound headdress with twisted knot (Aztec),
    or long snout headdress that terminates in serpent coil (Chaac).
  - **Teotihuacan "Tlaloc"**: goggle eyes + vertical lightning bolts + flower;
    slightly different from Aztec version.

  Four directional variants (east/west/north/south) each have distinct colours
  in Aztec tradition.
tags:
  culture_scope: [aztec_mexica, maya, zapotec, teotihuacan, general_mesoamerican]
  medium: [stone_relief, ceramics, codex_painting, architecture, stucco_mural]
  motif_type: [deity, animal, celestial]
  geometry: [symmetry, radial]
  surface: [carved, painted]
  palette: [jade_turquoise, mineral_pigments, full_ceremonial]
  composition: [central_mask, emblem]
  mood: [cosmic, ceremonial, mythic]
  remix: [none]
  shader_ops: [relief_shading, edge_ink, palette_map]
constraints:
  do:
    - Use goggle eyes as non-negotiable primary identifier.
    - Include curved fangs at the mouth, even in simplified versions.
    - Apply jade green or blue tones to water-association elements.
    - In paired or repeated border contexts, alternate facing direction.
  avoid:
    - Do not conflate with Aztec Xiuhcoatl (fire-serpent) — Tlaloc is
      water-associated, not fire.
parameters:
  eye_type: "goggle"         # goggle | ring | serpent-ring
  mouth_fangs: true
  lightning_axe: false       # include axe attribute
compat:
  - meso.jade_turquoise_palette
  - meso.feathered_serpent
  - meso.teotihuacan_mural_style
  - meso.classic_maya_relief_style
provenance:
  period: "Teotihuacan through Aztec, 200–1521 CE"
  sources:
    - "Nicholson, H. B. (1971). Religion in Pre-Hispanic Central Mexico."
    - "Taube, K. (1992). The Major Gods of Ancient Yucatan."
version: "1.0"
created_at: "2026-04-10"
